<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directions</title>

    <!-- bootstrap stuff -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- leaflet map css -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- my css -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4">

    <!-- keep high contrast on if I turned it on earlier -->
    <script>
        if (localStorage.getItem("contrastMode") === "on") {
            document.documentElement.classList.add("highContrast");
        }
    </script>

    <!-- high contrast toggle button -->
    <button id="contrastToggle" class="btn btn-dark mb-3">Toggle High Contrast</button>

    <!-- back + next buttons -->
    <div class="d-flex justify-content-between mb-3">
        <a href="index.html" class="btn btn-outline-primary">← Back</a>
        <a href="page2.html" class="btn btn-primary">Go to Events</a>
    </div>

    <!-- header box -->
    <div class="card p-4 mb-4">
        <h1 class="text-center mb-2">Directions</h1>
        <p class="text-center">Select two buildings to view distance, walk time, and current weather.</p>
    </div>

    <!-- map + sidebar layout -->
    <div class="row">

        <!-- map column -->
        <div class="col-lg-8 mb-4">
            <div class="card p-2">
                <!-- map container -->
                <div id="map" style="height: 650px; width: 100%; border-radius: 8px;"></div>
            </div>
        </div>

        <!-- sidebar column -->
        <div class="col-lg-4">

            <!-- building dropdowns -->
            <div class="card p-4 mb-4">
                <h3 class="mb-3">Select Buildings</h3>

                <!-- start building -->
                <select id="startSelect" aria-label="Select starting building" class="form-select mb-3">
                    <option value="">Select Start</option>
                </select>

                <!-- end building -->
                <select id="endSelect" aria-label="Select destination building" class="form-select">
                    <option value="">Select Destination</option>
                </select>
            </div>

            <!-- weather box -->
            <div class="card p-4 mb-4">
                <h3 class="mb-3">Jacksonville Weather</h3>
                <p id="temp">Loading...</p>
                <p id="wind">Loading...</p>
                <p id="condition">Loading...</p>
            </div>

            <!-- walk time box -->
            <div class="card p-4 mb-4">
                <h3 class="mb-3">Estimated Walk Time</h3>
                <p id="walkDistance">Distance: --</p>
                <p id="walkTime">Time: --</p>
            </div>

        </div>
    </div>

    <!-- leaflet js -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- my js files -->
    <script src="buildings.js"></script>
    <script src="page3.js"></script>

    <!-- high contrast toggle script -->
    <script>
        const contrastBtn = document.getElementById("contrastToggle");

        if (contrastBtn) {
            contrastBtn.addEventListener("click", function () {

                // flip the class on/off
                document.documentElement.classList.toggle("highContrast");

                // save it so it stays when switching pages
                if (document.documentElement.classList.contains("highContrast")) {
                    localStorage.setItem("contrastMode", "on");
                } else {
                    localStorage.setItem("contrastMode", "off");
                }
            });
        }
    </script>

</body>
</html>
