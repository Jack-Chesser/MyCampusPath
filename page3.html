<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directions</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- My CSS for this page -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Directions</h1>

    <nav>
        <a href="index.html">Back to Home</a>
    </nav>

    <!-- MAP + RIGHT SIDEBAR -->
    <div id="mapAndSidebar">

        <!-- LEFT SIDE: MAP -->
        <div id="map"></div>

        <!-- RIGHT SIDE: INPUTS + WEATHER -->
        <div id="sidebar">

            <div id="controls">
                <select id="startSelect">
                    <option value="">Select Start</option>
                </select>

                <select id="endSelect">
                    <option value="">Select Destination</option>
                </select>
            </div>

            <div id="weatherBox">
                <h3>Jacksonville Weather</h3>
                <p id="temp">Loading...</p>
                <p id="wind">Loading...</p>
                <p id="condition">Loading...</p>
            </div>

            
            <div id="walkBox">
                <h3>Estimated Walk Time</h3>
                <p id="walkDistance">Distance: --</p>
                <p id="walkTime">Time: --</p>
            </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- My JavaScript file -->
    <script src="buildings.js"></script>
    <script src="page3.js"></script>

    
</div>

</body>
</html>
