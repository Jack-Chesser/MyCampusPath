<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Events</title>

    <!-- bootstrap stuff -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- my css -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4">

    <!-- keep high contrast on if I turned it on earlier -->
    <script>
        if (localStorage.getItem("contrastMode") === "on") {
            document.documentElement.classList.add("highContrast");
        }
    </script>

    <!-- high contrast toggle button -->
    <button id="contrastToggle" class="btn btn-dark mb-3">Toggle High Contrast</button>

    <!-- back + next buttons -->
    <div class="d-flex justify-content-between mb-3">
        <a href="index.html" class="btn btn-outline-primary">← Back</a>
        <a href="page3.html" class="btn btn-primary">Go to Directions</a>
    </div>

    <!-- header box -->
    <div class="card p-4 mb-4">
        <h1 class="text-center mb-2">Campus Events</h1>
        <p class="text-center">View featured events and submit your own requests.</p>
    </div>

    <!-- featured events -->
    <div class="card p-4 mb-4">
        <h2 class="mb-3">Featured Events</h2>
        <ul id="eventList" class="list-group">
            <li class="list-group-item"> Finals – Monday–Friday</li>
            <li class="list-group-item"> Last Day to Leave – Friday @ 5 PM</li>
        </ul>
    </div>

    <!-- request form -->
    <div class="card p-4 mb-4">
        <h2 class="mb-3">Request a New Event</h2>

        <!-- input box -->
        <input type="text" id="eventInput" class="form-control mb-3" placeholder="Event name...">

        <!-- submit button -->
        <button id="addEventBtn" class="btn btn-success">Submit Request</button>

        <!-- little green message -->
        <p id="eventMessage" class="mt-3 text-success" style="display: none;">
            Event request added!
        </p>
    </div>

    <!-- saved requests -->
    <div class="card p-4 mb-4">
        <h2 class="mb-3">Your Requests</h2>
        <ul id="requestedEvents" class="list-group"></ul>
    </div>

    <!-- my js file -->
    <script src="page2.js"></script>

    <!-- high contrast toggle script -->
    <script>
        const contrastBtn = document.getElementById("contrastToggle");

        if (contrastBtn) {
            contrastBtn.addEventListener("click", function () {

                // flip the class on/off
                document.documentElement.classList.toggle("highContrast");

                // save it so it stays when switching pages
                if (document.documentElement.classList.contains("highContrast")) {
                    localStorage.setItem("contrastMode", "on");
                } else {
                    localStorage.setItem("contrastMode", "off");
                }
            });
        }
    </script>

</body>
</html>
